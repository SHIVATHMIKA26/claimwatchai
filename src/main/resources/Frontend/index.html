<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>ClaimWatchAI</title>

    <style>

        body{
            margin:0;
            font-family: "Segoe UI", Arial;
            background: linear-gradient(135deg,#e0f2ff,#f7e9ff);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{

            width:600px;
            background:white;
            padding:35px;
            border-radius:16px;
            box-shadow:0 10px 35px rgba(0,0,0,0.15);
        }

        .header{
            text-align:center;
        }

        .header img{
            width:70px;
            margin-bottom:10px;
        }

        .header h2{
            margin:0;
            color:#3a3a3a;
        }

        .header p{
            color:#777;
            font-size:14px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:12px;
            margin-top:20px;
        }

        input{
            padding:10px;
            border-radius:8px;
            border:1px solid #ddd;
            font-size:14px;
        }

        input:focus{
            outline:none;
            border:1px solid #6a7cff;
        }

        button{
            margin-top:18px;
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            font-size:16px;
            font-weight:600;
            background:linear-gradient(90deg,#6a7cff,#b86bff);
            color:white;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.04);
        }

        .result{
            margin-top:25px;
            padding:18px;
            border-radius:10px;
            background:#f6f6f6;
            text-align:center;
        }

        .badge{
            padding:8px 16px;
            border-radius:20px;
            font-weight:bold;
        }

        .legit{
            background:#d4ffe6;
            color:#1a8b52;
        }

        .fraud{
            background:#ffe0e0;
            color:#d12d2d;
        }

        footer{
            text-align:center;
            font-size:12px;
            margin-top:15px;
            color:#888;
        }

    </style>

</head>


<body>

<div class="container">

    <div class="header">

        <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png">

        <h2>ClaimWatchAI</h2>

        <p>Smart Insurance Fraud Detection</p>

    </div>


    <div class="form-grid">

        <input id="months" placeholder="Months as Customer">
        <input id="age" placeholder="Age">

        <input id="deductable" placeholder="Policy Deductable">
        <input id="premium" placeholder="Annual Premium">

        <input id="umbrella" placeholder="Umbrella Limit">
        <input id="severity" placeholder="Incident Severity">

        <input id="vehicles" placeholder="Vehicles Involved">
        <input id="injuries" placeholder="Bodily Injuries">

        <input id="amount" placeholder="Total Claim Amount">

    </div>


    <button onclick="checkFraud()">Analyze Claim</button>


    <div class="result" id="result">

        AI prediction will appear here

    </div>


    <footer>

        ClaimWatchAI • Machine Learning Fraud Detection

    </footer>

</div>


<script>

    function checkFraud(){

        let data={

            monthsAsCustomer:parseInt(document.getElementById("months").value),
            age:parseInt(document.getElementById("age").value),
            policyDeductable:parseInt(document.getElementById("deductable").value),
            policyAnnualPremium:parseFloat(document.getElementById("premium").value),
            umbrellaLimit:parseInt(document.getElementById("umbrella").value),
            incidentSeverity:parseInt(document.getElementById("severity").value),
            numberOfVehiclesInvolved:parseInt(document.getElementById("vehicles").value),
            bodilyInjuries:parseInt(document.getElementById("injuries").value),
            totalClaimAmount:parseFloat(document.getElementById("amount").value)

        };


        fetch("http://localhost:8081/api/check-fraud",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(data)

        })

            .then(res=>res.json())

            .then(result=>{

                let badgeClass = result.prediction === "FRAUD" ? "fraud" : "legit"

                document.getElementById("result").innerHTML=

                    "<h3>Prediction</h3>"+
                    "<span class='badge "+badgeClass+"'>"+result.prediction+"</span>"+
                    "<p style='margin-top:10px'>Fraud Probability: <b>"+result.fraudProbability+"</b></p>"

            })

            .catch(error=>{

                document.getElementById("result").innerHTML="⚠ Backend connection error"

            })

    }

</script>

</body>
</html>
