<!DOCTYPE html>
<html>
<head>

    <title>ClaimWatchAI - Insurance Fraud Detection</title>

    <style>

        body{
            font-family:Arial;
            background:#eef2f7;
            padding:40px;
        }

        .container{
            width:520px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 8px 25px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ddd;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            background:#0077ff;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#005edb;
        }

        .result{
            margin-top:20px;
            padding:15px;
            border-radius:6px;
            background:#f1f1f1;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>ClaimWatchAI Fraud Detection</h2>

    <input id="months" placeholder="Months As Customer">
    <input id="age" placeholder="Age">
    <input id="deductable" placeholder="Policy Deductable">
    <input id="premium" placeholder="Policy Annual Premium">
    <input id="umbrella" placeholder="Umbrella Limit">
    <input id="gains" placeholder="Capital Gains">
    <input id="loss" placeholder="Capital Loss">
    <input id="severity" placeholder="Incident Severity">
    <input id="vehicles" placeholder="Number Of Vehicles Involved">
    <input id="injuries" placeholder="Bodily Injuries">
    <input id="amount" placeholder="Total Claim Amount">

    <button onclick="submitClaim()">Analyze Claim</button>

    <div class="result" id="result"></div>

</div>

<script>

    function submitClaim(){

        let data = {

            months_as_customer:parseInt(document.getElementById("months").value),
            age:parseInt(document.getElementById("age").value),
            policy_deductable:parseInt(document.getElementById("deductable").value),
            policy_annual_premium:parseFloat(document.getElementById("premium").value),
            umbrella_limit:parseInt(document.getElementById("umbrella").value),
            capital_gains:parseInt(document.getElementById("gains").value),
            capital_loss:parseInt(document.getElementById("loss").value),
            incident_severity:parseInt(document.getElementById("severity").value),
            number_of_vehicles_involved:parseInt(document.getElementById("vehicles").value),
            bodily_injuries:parseInt(document.getElementById("injuries").value),
            total_claim_amount:parseFloat(document.getElementById("amount").value)

        };

        fetch("http://localhost:8080/api/check-fraud",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(data)

        })

            .then(response=>response.json())

            .then(result=>{

                document.getElementById("result").innerHTML =

                    "<b>Prediction:</b> "+result.prediction+
                    "<br><b>Fraud Probability:</b> "+result.fraudProbability+"%";

            })

            .catch(error=>{

                console.log(error);

                document.getElementById("result").innerHTML="Error connecting to backend.";

            });

    }

</script>

</body>
</html>
